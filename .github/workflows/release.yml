name: Build manual + release

# Runs only on:
#  - push of a v* tag (builds the PDF and creates the GitHub Release)
#  - manual fire from the Actions UI ("Run workflow" button) — useful
#    for dry-running the PDF build without cutting a release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Needed by softprops/action-gh-release to create the Release on tag pushes.
# Default GITHUB_TOKEN is read-only.
permissions:
  contents: write

# GitHub is migrating JavaScript actions from Node 20 → 24 (Node 20 leaves
# the runners in Sep 2026). Opt in now to silence the deprecation warning
# and skip the eventual forced flip.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-manual:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Without this, actions/checkout creates lightweight tag refs
          # but doesn't fetch the annotated tag *objects*. `%(contents)`
          # then falls back to the commit subject, which is the wrong
          # body for the Release page.
          fetch-tags: true

      - name: Install pandoc, xelatex, fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-latex-extra \
            texlive-pictures \
            fonts-inter \
            fonts-dejavu-mono

      - name: Build the manual
        run: bash docs/build.sh

      - name: Upload PDF as workflow artifact
        # Always runs — gives you a downloadable PDF for every push / PR / dispatch,
        # not just for tag-driven releases. 30-day retention is plenty for review.
        uses: actions/upload-artifact@v4
        with:
          name: piPalette-Manual
          path: docs/build/piPalette-Manual.pdf
          retention-days: 30
          if-no-files-found: error

      - name: Extract tag annotation for Release body
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # Belt and braces: explicitly pull tag objects in case the
          # checkout step somehow ended up with only lightweight refs.
          git fetch --tags --force origin

          TAG_NAME="${GITHUB_REF##refs/tags/}"
          TAG_TYPE="$(git cat-file -t "$TAG_NAME")"

          if [[ "$TAG_TYPE" == "tag" ]]; then
            # Annotated tag — the contents after the first blank line is
            # the body. Drops the header section that git cat-file prints.
            git cat-file -p "$TAG_NAME" | sed '1,/^$/d' > .release-body.txt
          else
            # Lightweight tag (no annotation) — fall back to a one-liner
            # so the Release still has a meaningful body.
            echo "Release $TAG_NAME" > .release-body.txt
          fi

          echo "--- release body ---"
          cat .release-body.txt
          echo "--- end ---"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body_path: .release-body.txt
          files: docs/build/piPalette-Manual.pdf
          fail_on_unmatched_files: true
